<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY CUBE :: Management System</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700; font-display: block;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* 캡처 시 물리적 고정 규격 (정확도 향상 핵심) */
        .export-area { 
            width: 1700px !important; 
            min-width: 1700px !important; 
            background: white !important; 
            padding: 60px !important; 
            box-sizing: border-box !important;
        }

        /* 스크롤바 커스텀 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e1e22; border-radius: 10px; }
        
        /* 모달 애니메이션 */
        .modal-animate { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalIn { 
            from { opacity: 0; transform: scale(0.95) translateY(10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* 그리드 레이아웃 고정 */
        .grid-layout { display: grid !important; grid-template-columns: 0.7fr repeat(7, 1fr) !important; }
        .time-slot { height: 100px; border-bottom: 1px solid #f1f5f9; }

        /* 텍스트 렌더링 안정화 */
        .stat-container { display: flex !important; align-items: baseline !important; line-height: 1 !important; }
        .stat-number { font-weight: 900; }
        .stat-unit { font-weight: 700; opacity: 0.3; font-style: italic; margin-left: 4px; }
        .schedule-block { line-height: 1.2 !important; word-break: keep-all; }
    </style>
</head>
<body class="text-slate-900 font-medium">
    
    <div id="root"></div>

    <script type="text/babel" src="Timetable.js"></script>

</body>
</html>
