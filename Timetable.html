<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY CUBE :: Integrated System</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700; font-display: block;
        }
        body { 
            margin: 0; 
            font-family: 'Pretendard', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        /* [Significance: A4 물리 규격 강제] */
        .export-area { 
            width: 1000px !important; /* Timetable.js 연산 기준값 */
            min-height: 1414px !important; /* A4 비율(1:1.414) 유지 */
            background: white !important;
            margin: 0 auto;
            position: relative;
            box-sizing: border-box !important;
        }

        /* 프린트/캡처 시 UI 제외 프로토콜 */
        @media print {
            .no-print { display: none !important; }
        }

        /* 에브리타임 스타일 그리드 연산 구조 */
        .grid-layout { 
            display: grid !important; 
            grid-template-columns: 64px repeat(5, 1fr) !important; /* 시간축 + 5일 */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="Auth.js"></script>
    <script type="text/babel" src="Export.js"></script>
    
    <script type="text/babel" src="Timetable.js"></script>
</body>
</html>
