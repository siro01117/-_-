<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY CUBE :: Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700; font-display: block;
        }
        body { margin: 0; background-color: #f8fafc; font-family: 'Pretendard', sans-serif; }
        
        .tab-slot { 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: -10px 0 30px rgba(0,0,0,0.03);
            z-index: 1;
            background-color: rgba(241, 245, 249, 0.5);
        }

        /* 데스크톱(1024px 이상) 전용 효과 */
        @media (min-width: 1024px) {
            body { overflow: hidden; } /* 데스크톱은 화면 고정 */
            .tab-slot:hover { 
                transform: translateX(-15px);
                box-shadow: -30px 0 60px rgba(0,0,0,0.15);
                z-index: 10;
                background-color: #ffffff;
            }
        }

        /* 1024px 미만 (태블릿/모바일) 4행 배치 강제 */
        @media (max-width: 1023px) {
            .double-line { display: none !important; }
            .tab-slot { 
                border-right: none !important; 
                border-bottom: 1px solid #e2e8f0;
                min-height: 25vh; /* 화면의 1/4씩 차지하도록 설정 */
            }
            .content-wrapper { flex-direction: column !important; }
            body { overflow-y: auto; }
        }

        .double-line { border-bottom: 4px double #1E1E22; width: 100%; margin-top: auto; }
        .logo-glow { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2)); }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen w-full select-none">

    <div class="w-full lg:w-[22%] bg-[#1E1E22] flex flex-col items-center justify-center p-10 text-white z-20 shrink-0 lg:h-screen">
        <div class="w-32 h-32 lg:w-48 lg:h-48 mb-8 lg:mb-16 flex items-center justify-center">
            <img src="1.png" alt="LOGO" class="logo-glow w-full h-full object-contain invert">
        </div>
        <div class="text-center tracking-tighter uppercase italic leading-[0.85]">
            <h1 class="text-5xl lg:text-7xl font-black">STUDY</h1>
            <h1 class="text-5xl lg:text-7xl font-black mt-2">CUBE</h1>
        </div>
    </div>

    <div class="content-wrapper flex flex-col lg:flex-row flex-1">
        
        <a href="Timetable.html" class="tab-slot flex-1 border-r border-slate-200 p-8 lg:p-14 flex flex-col no-underline text-inherit group">
            <h2 class="text-3xl lg:text-5xl font-black text-[#1E1E22] mt-4 lg:mt-10 transition-transform group-hover:scale-105 origin-left">Timetable</h2>
            <div class="double-line mb-4 lg:mb-10 opacity-20 group-hover:opacity-100 transition-opacity"></div>
        </a>

        <div class="tab-slot flex-1 border-r border-slate-200 p-8 lg:p-14 flex flex-col opacity-60">
            <h2 class="text-3xl lg:text-5xl font-black text-[#1E1E22] mt-4 lg:mt-28">Task List</h2>
            <div class="double-line mb-4 lg:mb-16 opacity-10"></div>
        </div>

        <div class="tab-slot flex-1 border-r border-slate-200 p-8 lg:p-14 flex flex-col opacity-40">
            <h2 class="text-3xl lg:text-5xl font-black text-[#1E1E22] mt-4 lg:mt-10">IDEA</h2>
            <div class="double-line mb-4 lg:mb-20 opacity-10"></div>
        </div>

        <div class="tab-slot flex-1 p-8 lg:p-14 flex flex-col opacity-20">
            <h2 class="text-3xl lg:text-5xl font-black text-[#1E1E22] mt-4 lg:mt-28">SURVEY</h2>
            <div class="double-line mb-4 lg:mb-24 opacity-10"></div>
        </div>

    </div>

</body>
</html>
