<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY CUBE :: Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700; font-display: block;
        }
        body { margin: 0; background-color: #ffffff; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        
        .tab-slot { 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            background-color: #ffffff;
            min-height: 200px; /* 세로 배치 시 최소 높이 확보 */
        }
        
        /* 호버 시 상호작용: 모바일/태블릿에서는 터치 고려하여 최적화 */
        @media (min-width: 1024px) {
            .tab-slot:hover { 
                transform: translateY(-20px);
                box-shadow: -20px 20px 60px rgba(0,0,0,0.1);
                z-index: 10;
            }
        }

        .double-line { 
            border-top: 1px solid #1E1E22;
            border-bottom: 1px solid #1E1E22;
            height: 4px;
            width: 100%;
            margin-top: auto;
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            transition: all 0.5s ease;
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen w-full select-none">

    <div class="hidden sm:flex w-full lg:w-[20%] bg-[#1E1E22] flex-col items-center justify-center p-8 lg:p-12 text-white z-20 shrink-0">
        <div class="w-32 h-32 lg:w-48 lg:h-48 mb-8 lg:mb-24 flex items-center justify-center">
            <img src="1.png" alt="LOGO" class="logo-glow w-full h-full object-contain invert">
        </div>
        <div class="text-center font-black uppercase leading-[0.9]">
            <h1 class="text-4xl lg:text-6xl tracking-tight">STUDY</h1>
            <h1 class="text-4xl lg:text-6xl mt-3 tracking-tight">CUBE</h1>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row flex-1 h-full overflow-y-auto lg:overflow-hidden">
        
        <a href="Timetable.html" class="tab-slot flex-1 border-b lg:border-b-0 lg:border-r border-slate-100 p-10 lg:p-14 flex flex-col no-underline text-inherit group">
            <h2 class="text-3xl lg:text-4xl font-extrabold text-[#1E1E22] mt-4 lg:mt-12 group-hover:scale-105 transition-transform origin-left">Timetable</h2>
            <div class="double-line mt-8 lg:mt-auto mb-4 lg:mb-12"></div>
        </a>

        <div class="tab-slot flex-1 border-b lg:border-b-0 lg:border-r border-slate-100 p-10 lg:p-14 flex flex-col opacity-80">
            <h2 class="text-2xl lg:text-3xl font-extrabold text-[#1E1E22] mt-4 lg:mt-24">Task List</h2>
            <div class="double-line mt-8 lg:mt-auto mb-4 lg:mb-16"></div>
        </div>

        <div class="tab-slot flex-1 border-b lg:border-b-0 lg:border-r border-slate-100 p-10 lg:p-14 flex flex-col opacity-60">
            <h2 class="text-2xl lg:text-3xl font-extrabold text-[#1E1E22] mt-4 lg:mt-12">IDEA</h2>
            <div class="double-line mt-8 lg:mt-auto mb-4 lg:mb-20"></div>
        </div>

        <div class="tab-slot flex-1 p-10 lg:p-14 flex flex-col opacity-40">
            <h2 class="text-2xl lg:text-3xl font-extrabold text-[#1E1E22] mt-4 lg:mt-24">SURVEY</h2>
            <div class="double-line mt-8 lg:mt-auto mb-4 lg:mb-24"></div>
        </div>

    </div>

</body>
</html>
