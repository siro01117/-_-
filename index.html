<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STUDY CUBE :: Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700; font-display: block;
        }
        body { margin: 0; background-color: #ffffff; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        
        .tab-slot { 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: -15px 0 45px rgba(0,0,0,0.05);
            z-index: 1;
            background-color: #ffffff;
        }
        .tab-slot:hover { 
            transform: translateY(-20px);
            box-shadow: -20px 20px 60px rgba(0,0,0,0.15);
            z-index: 10;
        }
        /* 이미지 하단의 특징적인 이중 실선 */
        .double-line { 
            border-top: 1px solid #1E1E22;
            border-bottom: 1px solid #1E1E22;
            height: 4px;
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>
<body class="flex h-screen w-full select-none">

    <div class="w-[20%] bg-[#1E1E22] flex flex-col items-center justify-center p-12 text-white z-20">
        <div class="w-48 h-48 mb-24 flex items-center justify-center">
            <svg viewBox="0 0 100 100" class="w-full h-full stroke-white fill-none" stroke-width="1.5">
                <path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" />
                <path d="M50 5 L50 95 M10 25 L90 25 M10 75 L90 75" opacity="0.3"/>
                <path d="M50 35 L75 48 L75 72 L50 85 L25 72 L25 48 Z" fill="white" />
            </svg>
        </div>
        <div class="text-center font-black uppercase leading-[0.9]">
            <h1 class="text-6xl tracking-tight">STUDY</h1>
            <h1 class="text-6xl mt-3 tracking-tight">CUBE</h1>
        </div>
    </div>

    <a href="Timetable.html" class="tab-slot flex-[1.2] border-r border-slate-100 p-14 flex flex-col no-underline text-inherit group">
        <h2 class="text-4xl font-extrabold text-[#1E1E22] mt-12 group-hover:scale-105 transition-transform origin-left">Timetable</h2>
        <div class="double-line mb-12"></div>
    </a>

    <div class="tab-slot flex-1 border-r border-slate-100 p-14 flex flex-col">
        <h2 class="text-3xl font-extrabold text-[#1E1E22] mt-24">Task List</h2>
        <div class="double-line mb-16"></div>
    </div>

    <div class="tab-slot flex-1 border-r border-slate-100 p-14 flex flex-col">
        <h2 class="text-3xl font-extrabold text-[#1E1E22] mt-12">IDEA</h2>
        <div class="double-line mb-20"></div>
    </div>

    <div class="tab-slot flex-1 p-14 flex flex-col">
        <h2 class="text-3xl font-extrabold text-[#1E1E22] mt-24">SURVEY</h2>
        <div class="double-line mb-24"></div>
    </div>

</body>
</html>
