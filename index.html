<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY CUBE :: Ultra Modern Schedule</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Black.woff2" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel" src="MainSystem.js"></script>
    <script type="text/babel" src="StartPage.js"></script>
    <script type="text/babel">
        // [시스템 라이프사이클 제어부]
        const App = () => {
            // 시작 상태를 관리하는 상태 엔진 (View State)
            const [isStarted, setIsStarted] = React.useState(false);

            // 평형 상태 유지: isStarted가 true이면 메인 시스템, false이면 시작 페이지 렌더링
            return isStarted ? (
                <MainSystem /> 
            ) : (
                <StartPage onStart={() => setIsStarted(true)} />
            );
        };
        // 최상위 노드에 주입
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
